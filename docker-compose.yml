version: '3.8'

services:
  backend:
    build: ./backend
    container_name: yazolna_backend
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - backend_static:/app/static
      - backend_media:/app/media
      - ./backend/db.sqlite3:/app/db.sqlite3
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
    restart: always

  frontend:
    build: .
    container_name: yazolna_frontend
    expose:
      - "80"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: yazolna_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - backend_static:/var/www/backend/static
      - backend_media:/var/www/backend/media
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  backend_static:
  backend_media:
